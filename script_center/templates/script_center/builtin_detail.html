{% extends "base.html" %}

{% block content %}
<div class="card" style="margin-bottom: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: start;">
        <div>
            <h2 style="margin-bottom: 10px;">{{ script.name }}</h2>
            <p style="color: #909399;">{{ script.description }}</p>
            <p style="margin-top: 10px; font-size: 12px; color: #606266;">
                路径: {{ script.file_path }} | 版本: {{ script.version }}
            </p>
        </div>
        <a href="{% url 'script_center:builtin_list' %}" class="btn btn-default">返回列表</a>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <!-- 左侧：参数配置与执行 -->
    <div class="card">
        <h3 style="margin-bottom: 20px;">运行配置</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div style="margin-top: 30px;">
                <button type="submit" class="btn btn-success" style="width: 100%; font-size: 16px; padding: 12px;">
                    立即执行此脚本
                </button>
            </div>
        </form>
    </div>

    <!-- 右侧：源码展示 -->
    <div class="card">
        <h3 style="margin-bottom: 20px;">脚本源码</h3>
        <pre style="background-color: #f5f7fa; padding: 15px; border-radius: 4px; overflow-x: auto; max-height: 500px; overflow-y: auto; font-size: 12px; line-height: 1.5;">{{ source_code }}</pre>
    </div>
</div>

<style>
    /* 简单美化一下 Django Form */
    p { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #606266; }
    input, select { width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px; box-sizing: border-box; }
    .helptext { font-size: 12px; color: #909399; }
</style>
{% endblock %}
